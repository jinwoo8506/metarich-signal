<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종합 재무설계 리포트 | MetaRich Signal</title>
<script src="common.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Barlow:ital,wght@0,300;0,600;0,800;0,900;1,300&display=swap" rel="stylesheet">
<style id="commonStyle"></style>
<style>
/* ══════════════════════════════
   CSS 변수 & 기본
══════════════════════════════ */
:root {
  --navy:   #0f1e3c;
  --blue:   #1a56db;
  --sky:    #0ea5e9;
  --teal:   #0d9488;
  --mint:   #10b981;
  --gold:   #f59e0b;
  --orange: #f97316;
  --red:    #ef4444;
  --purple: #7c3aed;
  --pink:   #ec4899;
  --bg:     #f0f4ff;
  --white:  #ffffff;
  --gray50: #f8fafc;
  --gray100:#f1f5f9;
  --gray200:#e2e8f0;
  --gray400:#94a3b8;
  --gray600:#475569;
  --gray800:#1e293b;
}

/* ── 리포트 전용 레이아웃 ── */
.rpt-main { margin-left: var(--nav-w); padding: 24px 32px 60px; max-width: calc(100% - var(--nav-w)); }

/* ══ 상담직원 설정 패널 ══ */
.advisor-panel {
  background: var(--white);
  border-radius: 16px;
  padding: 20px 28px;
  margin-bottom: 20px;
  box-shadow: 0 4px 24px rgba(26,86,219,.10);
  border-left: 5px solid var(--blue);
  display: flex;
  gap: 20px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.advisor-panel .fg label { font-size: 11px; font-weight: 700; color: var(--gray600); margin-bottom: 5px; display: block; }
.advisor-panel .fg input,
.advisor-panel .fg select {
  padding: 9px 14px;
  border: 1.5px solid var(--gray200);
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  background: var(--gray50);
  outline: none;
  min-width: 160px;
}
.advisor-panel .fg input:focus, .advisor-panel .fg select:focus { border-color: var(--blue); background:#fff; }

/* ══ 리포트 본문 ══ */
#reportBody { display: none; }

/* ── 페이지 구분 ── */
.rpt-page {
  background: var(--white);
  border-radius: 20px;
  margin-bottom: 32px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(15,30,60,.12);
  /* 화면에서도 A4 landscape 비율(297:210 = 1.414:1) 미리보기 */
  width: 100%;
  aspect-ratio: 297 / 210;
  display: flex;
  flex-direction: column;
}

/* ── 페이지 헤더 ── */
.page-hero {
  background: linear-gradient(135deg, var(--navy) 0%, #1a3a6e 40%, #1e40af 70%, var(--sky) 100%);
  padding: 32px 40px;
  position: relative;
  overflow: hidden;
  color: #fff;
}
.page-hero::before {
  content: '';
  position: absolute;
  right: -80px; top: -80px;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(14,165,233,.35), transparent 70%);
}
.page-hero::after {
  content: '';
  position: absolute;
  left: 30%; bottom: -60px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,.25), transparent 70%);
}
.hero-eyebrow { font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; color: rgba(255,255,255,.55); text-transform: uppercase; margin-bottom: 6px; }
.hero-title { font-family: 'Barlow', sans-serif; font-size: 30px; font-weight: 900; line-height: 1.1; margin-bottom: 4px; position: relative; }
.hero-sub { font-size: 13px; color: rgba(255,255,255,.7); position: relative; }
.hero-badges { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; position: relative; }
.hero-badge {
  padding: 4px 14px; border-radius: 99px; font-size: 11px; font-weight: 600;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
  backdrop-filter: blur(4px);
}
.hero-score-area {
  position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
  display: flex; gap: 24px; align-items: center;
}

/* ── 섹션 내부 패딩 ── */
.rpt-body {
  padding: 20px 30px;
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.rpt-section-title {
  font-family: 'Barlow', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--gray400); margin-bottom: 10px; margin-top: 10px;
  display: flex; align-items: center; gap: 10px;
}
.rpt-section-title:first-child { margin-top: 0; }
.rpt-section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--gray200), transparent);
}

/* ══ 인포그래픽 그리드 ══ */
.info-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
.info-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 10px; }
.info-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 10px; }
.info-grid-52 { display: grid; grid-template-columns: 5fr 2fr; gap: 14px; margin-bottom: 10px; }
.info-grid-25 { display: grid; grid-template-columns: 2fr 5fr; gap: 14px; margin-bottom: 10px; }

/* ── 스탯 카드 ── */
.stat-card {
  border-radius: 10px; padding: 12px 14px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: attr(data-icon);
  position: absolute; right: 8px; top: 4px;
  font-size: 36px; opacity: .12;
}
.stat-label { font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
.stat-val { font-family: 'Barlow', sans-serif; font-size: 20px; font-weight: 900; line-height: 1; margin-bottom: 2px; }
.stat-sub { font-size: 10px; opacity: .75; }

/* ── 게이지 링 (SVG) ── */
.gauge-wrap { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
.gauge-label { font-size: 11px; font-weight: 700; color: var(--gray600); margin-top: 4px; text-align: center; }
.gauge-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
  font-family: 'Barlow', sans-serif; font-size: 22px; font-weight: 900; line-height: 1; }
.gauge-sub { position: absolute; top: 50%; left: 50%; transform: translate(-50%, 40%);
  font-size: 10px; color: var(--gray400); white-space: nowrap; }

/* ── Before / After 비교 카드 ── */
.ba-card {
  border-radius: 14px; overflow: hidden;
}
.ba-header {
  padding: 12px 18px; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
}
.ba-before .ba-header { background: #fff1f2; color: #be123c; }
.ba-after  .ba-header { background: #f0fdf4; color: #15803d; }
.ba-body { padding: 14px 18px; background: var(--gray50); border: 1.5px solid var(--gray200); border-top: none; border-radius: 0 0 14px 14px; }
.ba-row { display: flex; justify-content: space-between; align-items: baseline;
  padding: 7px 0; border-bottom: 1px dashed var(--gray200); font-size: 12px; }
.ba-row:last-child { border: none; }
.ba-row-label { color: var(--gray600); }
.ba-row-val { font-weight: 700; font-family: 'Barlow', sans-serif; font-size: 14px; }
.ba-before .ba-row-val { color: #be123c; }
.ba-after  .ba-row-val { color: #15803d; }

/* ══ 인포그래픽 그리드 ══ */
.effect-infos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.effect-info {
  border-radius: 10px; padding: 12px 14px;
  display: grid; grid-template-rows: auto 1fr auto; gap: 2px;
  position: relative; overflow: hidden;
}
.effect-info::after { content: ''; position: absolute; bottom: -16px; right: -16px;
  width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,.12); }
.ei-label { font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; opacity: .75; }
.ei-before { font-size: 10px; text-decoration: line-through; opacity: .5; margin-top: 1px; }
.ei-after { font-family: 'Barlow', sans-serif; font-size: 16px; font-weight: 900; line-height: 1.1; margin: 4px 0; }
.ei-diff { font-size: 10px; font-weight: 700; background: rgba(255,255,255,.25); display: inline-block; padding: 1px 6px; border-radius: 99px; }

/* ── 섹션 진행 체크리스트 ── */
.checklist-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.check-chip {
  border-radius: 8px; padding: 8px 10px;
  display: flex; align-items: center; gap: 6px; font-size: 11px;
}
.check-chip.done { background: #f0fdf4; border: 1.5px solid #86efac; }
.check-chip.todo { background: var(--gray50); border: 1.5px solid var(--gray200); }
.check-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.check-chip.done .check-icon { background: #dcfce7; }
.check-chip.todo .check-icon { background: var(--gray100); }
.check-name { font-weight: 700; color: var(--gray800); line-height: 1.2; font-size: 10px; }
.check-status { font-size: 9px; color: var(--gray400); margin-top: 1px; }
.check-chip.done .check-status { color: #16a34a; }

/* ── 액션 타임라인 ── */
.action-track { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-bottom: 20px; position: relative; }
.action-track::before { content: ''; position: absolute; left: 12.5%; right: 12.5%; top: 20px; height: 3px;
  background: linear-gradient(90deg, var(--red), var(--gold), var(--mint), var(--blue)); z-index: 0; }
.action-node { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 0 8px; position: relative; z-index: 1; }
.action-dot { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 16px; border: 3px solid var(--white); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
.action-period { font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--gray400); }
.action-title { font-size: 12px; font-weight: 700; color: var(--gray800); text-align: center; line-height: 1.4; }
.action-desc { font-size: 11px; color: var(--gray600); text-align: center; line-height: 1.4; }

/* ── 노후 소득 비교 시각화 ── */
.income-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.income-box { border-radius: 14px; padding: 20px; }
.income-box.before { background: linear-gradient(135deg, #fff1f2, #ffe4e6); border: 1.5px solid #fecdd3; }
.income-box.after  { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border: 1.5px solid #86efac; }
.income-title { font-size: 12px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.income-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed rgba(0,0,0,.08); font-size: 12px; }
.income-row:last-child { border: none; }
.income-bar { height: 5px; border-radius: 99px; margin-top: 3px; }
.income-total { margin-top: 12px; padding: 12px; border-radius: 10px; background: rgba(255,255,255,.6); text-align: center; }
.income-total-val { font-family: 'Barlow', sans-serif; font-size: 28px; font-weight: 900; line-height: 1; }
.income-total-label { font-size: 10px; font-weight: 600; letter-spacing: .5px; margin-top: 2px; }

/* ── 상담직원 카드 (화면 + 인쇄) ── */
.advisor-card {
  background: linear-gradient(135deg, var(--navy) 0%, #1a3a6e 60%, var(--blue) 100%);
  border-radius: 16px; padding: 24px 32px;
  display: flex; justify-content: space-between; align-items: center;
  color: #fff; flex-wrap: wrap; gap: 16px;
}
.advisor-info { display: flex; align-items: center; gap: 20px; }
.advisor-avatar { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,.15);
  display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.advisor-name { font-family: 'Barlow', sans-serif; font-size: 22px; font-weight: 900; }
.advisor-role { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 2px; }
.advisor-contact { font-size: 14px; font-weight: 600; margin-top: 4px; color: var(--sky); }
.advisor-sign { text-align: right; }
.sign-label { font-size: 10px; color: rgba(255,255,255,.5); letter-spacing: .5px; }
.sign-line { width: 180px; height: 1px; background: rgba(255,255,255,.3); margin: 6px 0; }
.sign-date { font-size: 13px; color: rgba(255,255,255,.7); }
.next-meeting { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 8px; }

/* ── 버튼 바 ── */
.action-bar {
  position: sticky; top: 0; z-index: 50; background: rgba(240,244,255,.95);
  backdrop-filter: blur(8px); padding: 12px 32px;
  display: flex; gap: 10px; align-items: center;
  border-bottom: 1px solid var(--gray200); margin: -24px -32px 24px; flex-wrap: wrap;
}
.action-bar .bar-title { font-weight: 700; color: var(--navy); flex: 1; font-size: 14px; }

/* ══════════════════════════════
   A4 가로 인쇄
══════════════════════════════ */
@media print {
  /* ── 색상 완전 보존 ── */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  /* ── A4 가로, 여백 6mm (최소화해서 내용 공간 최대화) ── */
  @page {
    size: 297mm 210mm;   /* A4 landscape 명시적 고정 */
    margin: 6mm 8mm;
  }

  /* ── 레이아웃 초기화 ── */
  html, body {
    margin: 0 !important; padding: 0 !important;
    background: #f0f4ff !important;
    width: 297mm !important;
  }
  #fsNav, .action-bar, .advisor-panel, .no-print, button { display: none !important; }

  .rpt-main {
    margin-left: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
  }

  /* ── 핵심: 각 페이지를 A4 landscape 한 장 안에 완전히 고정 ──
     A4 landscape: 297mm × 210mm, 여백 6mm 상하 / 8mm 좌우
     내부 사용 가능: 285mm × 198mm = 약 1077px × 748px (96dpi)
     여기서는 mm 단위로 직접 지정
  ── */
  .rpt-page {
    width: 281mm !important;          /* 297 - 8*2 = 281mm */
    height: 198mm !important;         /* 210 - 6*2 = 198mm */
    overflow: hidden !important;
    page-break-after: always !important;
    page-break-inside: avoid !important;
    break-after: page !important;
    box-shadow: none !important;
    border-radius: 8px !important;
    margin: 0 !important;
    display: flex !important;
    flex-direction: column !important;
    box-sizing: border-box !important;
  }
  .rpt-page:last-child {
    page-break-after: avoid !important;
    break-after: avoid !important;
  }

  /* ── 헤더: 높이 고정 ── */
  .page-hero {
    padding: 12px 20px !important;
    flex-shrink: 0 !important;
    flex-grow: 0 !important;
  }
  .hero-eyebrow { font-size: 8px !important; margin-bottom: 2px !important; }
  .hero-title   { font-size: 16px !important; margin-bottom: 2px !important; }
  .hero-sub     { font-size: 10px !important; }
  .hero-badges  { gap: 4px !important; margin-top: 6px !important; }
  .hero-badge   { font-size: 9px !important; padding: 2px 8px !important; }

  /* ── 본문: 남은 공간 전부 사용, 스크롤 없이 ── */
  .rpt-body {
    padding: 12px 20px !important;
    flex: 1 !important;
    overflow: hidden !important;
    display: flex !important;
    flex-direction: column !important;
    min-height: 0 !important;
  }

  /* ── 섹션 타이틀 ── */
  .rpt-section-title {
    font-size: 8px !important;
    margin-bottom: 6px !important;
    margin-top: 8px !important;
  }
  .rpt-section-title:first-child { margin-top: 0 !important; }

  /* ── 그리드 간격 축소 ── */
  .info-grid-4 { gap: 6px !important; margin-bottom: 8px !important; }
  .info-grid-3 { gap: 8px !important; margin-bottom: 8px !important; }
  .info-grid-2 { gap: 10px !important; margin-bottom: 8px !important; }
  .effect-infos { gap: 6px !important; margin-bottom: 8px !important; }
  .checklist-grid { gap: 5px !important; }
  .income-compare { gap: 10px !important; margin-bottom: 8px !important; }

  /* ── 스탯 카드 축소 ── */
  .stat-card { padding: 10px 12px !important; border-radius: 8px !important; }
  .stat-label { font-size: 8px !important; margin-bottom: 2px !important; }
  .stat-val { font-size: 16px !important; }
  .stat-sub { font-size: 9px !important; }

  /* ── 기대효과 카드 ── */
  .effect-info { padding: 10px 12px !important; border-radius: 8px !important; gap: 2px !important; }
  .ei-label  { font-size: 8px !important; }
  .ei-before { font-size: 9px !important; }
  .ei-after  { font-size: 14px !important; margin: 3px 0 !important; }
  .ei-diff   { font-size: 9px !important; }

  /* ── 체크 칩 ── */
  .check-chip { padding: 8px 10px !important; border-radius: 7px !important; gap: 6px !important; }
  .check-icon { width: 22px !important; height: 22px !important; font-size: 11px !important; }
  .check-name { font-size: 10px !important; }
  .check-status { font-size: 9px !important; }

  /* ── 섹션 진행 게이지 영역 ── */
  .gauge-val { font-size: 16px !important; }

  /* ── 소득 비교 ── */
  .income-box { padding: 12px !important; border-radius: 8px !important; }
  .income-title { font-size: 10px !important; margin-bottom: 6px !important; }
  .income-row { padding: 4px 0 !important; font-size: 10px !important; }
  .income-total { padding: 8px !important; margin-top: 6px !important; }
  .income-total-val { font-size: 18px !important; }
  .income-total-label { font-size: 9px !important; }

  /* ── 어드바이저 카드 ── */
  .advisor-card {
    padding: 10px 16px !important;
    border-radius: 8px !important;
    flex-shrink: 0 !important;
  }
  .advisor-avatar { width: 36px !important; height: 36px !important; font-size: 16px !important; }
  .advisor-name { font-size: 14px !important; }
  .advisor-role { font-size: 10px !important; }
  .advisor-contact { font-size: 11px !important; }
  .sign-line { width: 120px !important; }

  /* ── 어드바이저 카드 감싸는 div 패딩 축소 ── */
  .rpt-page > div[style*="padding:0 36px"] {
    padding: 0 20px 10px !important;
    flex-shrink: 0 !important;
  }

  /* ── 액션 타임라인 ── */
  .action-track { margin-bottom: 10px !important; }
  .action-dot { width: 28px !important; height: 28px !important; font-size: 12px !important; }
  .action-period { font-size: 8px !important; }
  .action-title { font-size: 10px !important; }
  .action-desc { font-size: 9px !important; }

  /* ── BA 카드 ── */
  .ba-header { padding: 7px 12px !important; font-size: 9px !important; }
  .ba-body { padding: 8px 12px !important; }
  .ba-row { padding: 4px 0 !important; font-size: 10px !important; }
  .ba-row-val { font-size: 12px !important; }

  /* ── 차트 ── */
  canvas { max-height: 100px !important; }

  /* ── 핵심 메시지 배너 ── */
  .rpt-page .rpt-body > div[style*="linear-gradient(135deg,var(--navy)"] {
    padding: 12px 16px !important;
    margin-bottom: 8px !important;
    border-radius: 8px !important;
  }

  /* ── 텍스트 전반 축소 ── */
  .rpt-body div[style*="font-size:10px"],
  .rpt-body div[style*="font-size:11px"],
  .rpt-body div[style*="font-size:12px"] { font-size: 9px !important; }
  .rpt-body div[style*="font-size:13px"] { font-size: 10px !important; }
  .rpt-body div[style*="font-size:14px"] { font-size: 11px !important; }
  .rpt-body span[style*="font-size:10px"],
  .rpt-body span[style*="font-size:11px"],
  .rpt-body span[style*="font-size:12px"] { font-size: 9px !important; }

  /* ── 마진·패딩 인라인 스타일 override ── */
  .rpt-body > div { margin-bottom: 6px !important; }
}
</style>
</head>
<body>
<div id="navArea"></div>

<main class="rpt-main">

  <!-- ★ 상담직원 정보 입력 패널 (화면 전용) -->
  <div class="advisor-panel no-print">
    <div style="font-size:9px;font-weight:700;color:var(--navy);white-space:nowrap;">👤 상담직원 정보</div>
    <div class="fg">
      <label>이름</label>
      <input type="text" id="adv-name" placeholder="배진우" oninput="refreshAdvisor()">
    </div>
    <div class="fg">
      <label>직함</label>
      <select id="adv-title" onchange="refreshAdvisor()">
        <option value="팀장">팀장</option>
        <option value="지점장">지점장</option>
        <option value="사업부장">사업부장</option>
        <option value="본부장">본부장</option>
      </select>
    </div>
    <div class="fg">
      <label>자격증</label>
      <input type="text" id="adv-cert" placeholder="AFPK" oninput="refreshAdvisor()" style="width:100px;">
    </div>
    <div class="fg">
      <label>연락처</label>
      <input type="text" id="adv-phone" placeholder="010-0000-0000" oninput="refreshAdvisor()">
    </div>
    <div class="fg">
      <label>다음 미팅일</label>
      <input type="date" id="adv-nextdate" oninput="refreshAdvisor()">
    </div>
    <button class="btn btn-primary no-print" onclick="window.print()" style="white-space:nowrap;padding:10px 20px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--blue),var(--navy));color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:9px;font-weight:700;cursor:pointer;">🖨️ PDF 출력</button>
    <button class="btn no-print" onclick="exportClient()" style="white-space:nowrap;padding:10px 20px;border-radius:8px;border:1.5px solid var(--gray200);background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:9px;font-weight:700;cursor:pointer;color:var(--gray600);">💾 저장</button>
  </div>

  <!-- 고객 미선택 -->
  <div id="noClient" style="text-align:center;padding:80px;color:var(--gray400);">
    <div style="font-size:48px;margin-bottom:6px;">📊</div>
    <div style="font-size:9px;font-weight:700;margin-bottom:8px;color:var(--navy);">고객을 선택하면 인포그래픽 리포트가 생성됩니다</div>
    <div><a href="index.html" style="color:var(--blue);">← 대시보드로 이동</a></div>
  </div>

  <div id="reportBody"></div>

</main>

<script>
document.getElementById('commonStyle').textContent = COMMON_CSS;
document.getElementById('navArea').innerHTML = renderNav('report');

/* ── 유틸 ── */
function won(n) {
  if (!n || n === 0) return '-';
  n = parseInt(n);
  if (n >= 100000000) {
    const uk  = Math.floor(n / 100000000);
    const man = Math.floor((n % 100000000) / 10000);
    return uk + '억' + (man ? ' ' + man.toLocaleString() + '만' : '') + '원';
  }
  if (n >= 10000) return Math.floor(n / 10000).toLocaleString() + '만원';
  return n.toLocaleString() + '원';
}
function fw(n) { if (!n || n === 0) return '-'; return Math.round(n / 10000).toLocaleString() + '만원'; }

/* ── 상담직원 기본값 ── */
const saved_adv = JSON.parse(localStorage.getItem('fs_advisor') || '{}');
if (saved_adv.name)    document.getElementById('adv-name').value    = saved_adv.name;
if (saved_adv.title)   document.getElementById('adv-title').value   = saved_adv.title;
if (saved_adv.cert)    document.getElementById('adv-cert').value    = saved_adv.cert;
if (saved_adv.phone)   document.getElementById('adv-phone').value   = saved_adv.phone;
if (saved_adv.nextdate)document.getElementById('adv-nextdate').value= saved_adv.nextdate;

function getAdvisor() {
  return {
    name:     document.getElementById('adv-name').value    || '배진우',
    title:    document.getElementById('adv-title').value   || '팀장',
    cert:     document.getElementById('adv-cert').value    || 'AFPK',
    phone:    document.getElementById('adv-phone').value   || '',
    nextdate: document.getElementById('adv-nextdate').value|| ''
  };
}
function refreshAdvisor() {
  const adv = getAdvisor();
  localStorage.setItem('fs_advisor', JSON.stringify(adv));
  const c = FS.getActive();
  if (c) generateReport(c);
}

/* ── 게이지 SVG 생성 ── */
function makeSVGGauge(score, color, size = 90) {
  const r = size * 0.4;
  const cx = size / 2, cy = size / 2;
  const full = 2 * Math.PI * r;
  const dash = (score / 100) * full;
  const rot  = -90;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="9"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="9"
      stroke-dasharray="${dash} ${full - dash}"
      stroke-dashoffset="${full * 0.25}"
      stroke-linecap="round" transform="rotate(${rot} ${cx} ${cy})"/>
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
      font-family="Barlow,sans-serif" font-size="${size * 0.22}" font-weight="900" fill="${color}">${score}</text>
    <text x="${cx}" y="${cy + size * 0.18}" text-anchor="middle"
      font-family="Noto Sans KR,sans-serif" font-size="${size * 0.1}" fill="#94a3b8">점</text>
  </svg>`;
}

/* ── 미니 바 차트 SVG ── */
function miniBar(val, max, color, w = 80, h = 8) {
  const pct = Math.min(val / max, 1);
  return `<svg width="${w}" height="${h}" style="border-radius:99px;overflow:hidden;">
    <rect width="${w}" height="${h}" fill="#e2e8f0"/>
    <rect width="${Math.round(w * pct)}" height="${h}" fill="${color}" rx="4"/>
  </svg>`;
}

/* ── 재무 점수 계산 ── */
function calcScore(c, pension, risk, tax) {
  let score = 0;
  const sections = ['risk','pension','tax','realty','inherit','retirement','investment'];
  const done = sections.filter(s => FS.isDone(c.id, s)).length;
  score += done * 8;                                      // 섹션 완료 (max 56)
  if (c.monthly >= c.income * 0.1)  score += 10;         // 저축률 10% 이상
  if (+pension.qMonthly > 0)        score += 10;         // 연금 납입
  if (+risk.protection > 0)         score += 10;         // 보험 있음
  if (c.asset >= c.income)          score += 5;          // 자산 1년치 이상
  if (!c.debt || c.debt < c.asset * 0.3) score += 5;    // 부채 건전
  if (c.income > 0)                 score += 4;          // 소득 있음
  return Math.min(score, 100);
}

/* ══ 메인 리포트 생성 ══ */
const client = FS.getActive();
if (client) generateReport(client);

function generateReport(c) {
  document.getElementById('noClient').style.display   = 'none';
  document.getElementById('reportBody').style.display = 'block';

  const adv      = getAdvisor();
  const typeLabel = {employee:'직장인', self:'자영업자', freelance:'프리랜서'}[c.type] || '';
  const sections  = [
    {id:'risk',       icon:'🛡️', name:'위험관리·보험',  file:'01_risk.html'},
    {id:'pension',    icon:'🌅', name:'연금설계',        file:'02_pension.html'},
    {id:'tax',        icon:'💸', name:'절세전략',        file:'03_tax.html'},
    {id:'realty',     icon:'🏢', name:'부동산',          file:'04_realestate.html'},
    {id:'inherit',    icon:'📜', name:'상속·증여',       file:'05_inheritance.html'},
    {id:'retirement', icon:'🏦', name:'퇴직설계',        file:'07_retirement.html'},
    {id:'investment', icon:'📈', name:'투자설계',        file:'08_investment.html'},
  ];
  const doneCount = sections.filter(s => FS.isDone(c.id, s.id)).length;

  const pension    = FS.getSection(c.id,'pension')    || {};
  const risk       = FS.getSection(c.id,'risk')       || {};
  const investment = FS.getSection(c.id,'investment') || {};

  const pensionM   = (+pension.qMonthly || 0) + (+pension.nqMonthly || 0);
  const riskM      = (+risk.protection  || 0) + (+risk.saving       || 0);
  const totalM     = pensionM + riskM;
  const income     = c.income || 0;
  const taxRate    = income <= 55000000 ? 0.165 : 0.132;
  const qPension   = Math.min(+pension.qMonthly * 12 || 0, 9000000);
  const taxCredit  = Math.round(qPension * taxRate);

  // 30년 연금 시뮬
  const mr          = 0.04 / 12;
  const pvFactor    = (1 - Math.pow(1+mr, -300)) / mr;
  const fv30_after  = pensionM  > 0 ? pensionM  * ((Math.pow(1+mr, 360)-1)/mr) : 0;
  const fv30_before = c.monthly > 0 ? (c.monthly * 0.25) * ((Math.pow(1+mr, 360)-1)/mr) : 0;
  const retire_after  = Math.round(fv30_after  / pvFactor);
  const retire_before = Math.round(fv30_before / pvFactor);
  const national_est  = Math.round(income * 0.0025 * 12 * 0.4 / 12);

  // 재무 점수
  const fscore = calcScore(c, pension, risk, {});

  // 섹션별 점수 (게이지용)
  const scores = {
    보험:    risk.protection ? 75 : 10,
    연금:    pensionM > 0 ? 80 : 10,
    절세:    taxCredit > 0 ? 85 : 15,
    투자:    investment.profile ? 70 : 10,
    상속:    FS.isDone(c.id,'inherit') ? 60 : 5,
    퇴직:    FS.isDone(c.id,'retirement') ? 65 : 5,
  };

  // 다음 미팅일 포맷
  const nextDate = adv.nextdate
    ? new Date(adv.nextdate).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})
    : '일정 미정';

  document.getElementById('reportBody').innerHTML = `

  <!-- ══════════ PAGE 1: 고객 프로파일 & 재무 현황 ══════════ -->
  <div class="rpt-page">
    <div class="page-hero">
      <div style="display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;">
        <div>
          <div class="hero-eyebrow">MetaRich Signal Group · Comprehensive Financial Report</div>
          <div class="hero-title">${c.name} 고객님의<br>종합 재무설계 프로파일</div>
          <div class="hero-sub">${new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})} 기준 · 담당: ${adv.name} ${adv.title} ${adv.cert}</div>
          <div class="hero-badges">
            <span class="hero-badge">👤 ${c.age}세 · ${typeLabel}</span>
            <span class="hero-badge">💰 연소득 ${won(income)}</span>
            <span class="hero-badge">🏦 자산 ${won(c.asset)}</span>
            ${c.debt ? `<span class="hero-badge">💳 부채 ${won(c.debt)}</span>` : ''}
            ${investment.profile ? `<span class="hero-badge">📊 ${investment.profile}</span>` : ''}
          </div>
        </div>
        <!-- 종합 점수 도넛 -->
        <div style="text-align:center;flex-shrink:0;">
          <div style="position:relative;display:inline-block;">
            ${makeSVGGauge(fscore, fscore >= 70 ? '#10b981' : fscore >= 40 ? '#f59e0b' : '#ef4444', 90)}
          </div>
          <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.7);margin-top:4px;letter-spacing:.5px;">종합 재무 점수</div>
        </div>
      </div>
    </div>

    <div class="rpt-body">
      <!-- 핵심 수치 4개 -->
      <div class="rpt-section-title">Core Financial Metrics</div>
      <div class="info-grid-4" style="margin-bottom:8px;">
        <div class="stat-card" data-icon="💰" style="background:linear-gradient(135deg,#eff6ff,#dbeafe);color:var(--navy);">
          <div class="stat-label" style="color:var(--blue);">월 저축 가능액</div>
          <div class="stat-val" style="color:var(--blue);">${fw(c.monthly)}</div>
          <div class="stat-sub">소득 대비 ${income ? Math.round(c.monthly/income*100) : '-'}%</div>
          ${miniBar(c.monthly, income * 0.2, '#1a56db', 100, 6)}
        </div>
        <div class="stat-card" data-icon="🌅" style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:var(--navy);">
          <div class="stat-label" style="color:var(--teal);">월 연금 납입</div>
          <div class="stat-val" style="color:var(--teal);">${pensionM ? fw(pensionM) : '미설계'}</div>
          <div class="stat-sub">${pension.targetMonthly ? '목표 '+pension.targetMonthly+'만원/월' : '연금 설계 필요'}</div>
          ${miniBar(pensionM, c.monthly, '#0d9488', 100, 6)}
        </div>
        <div class="stat-card" data-icon="🛡️" style="background:linear-gradient(135deg,#fdf4ff,#f3e8ff);color:var(--navy);">
          <div class="stat-label" style="color:var(--purple);">월 보험료</div>
          <div class="stat-val" style="color:var(--purple);">${riskM ? fw(riskM) : '미설계'}</div>
          <div class="stat-sub">소득 대비 ${income ? Math.round(riskM/income*12*100) : '-'}%</div>
          ${miniBar(riskM, income * 0.12 / 12, '#7c3aed', 100, 6)}
        </div>
        <div class="stat-card" data-icon="💸" style="background:linear-gradient(135deg,#fffbeb,#fef3c7);color:var(--navy);">
          <div class="stat-label" style="color:var(--gold);">연간 세액공제</div>
          <div class="stat-val" style="color:var(--gold);">${taxCredit ? fw(taxCredit) : '미신청'}</div>
          <div class="stat-sub">${taxCredit ? '매년 자동 환급' : '최대 '+fw(income*taxRate*0.9)+' 가능'}</div>
          ${miniBar(taxCredit, income * taxRate, '#f59e0b', 100, 6)}
        </div>
      </div>

      <!-- 영역별 재무 게이지 -->
      <div class="rpt-section-title">Financial Health by Domain</div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:6px;">
        ${Object.entries(scores).map(([k, v]) => {
          const color = v >= 70 ? '#10b981' : v >= 40 ? '#f59e0b' : '#ef4444';
          return `<div style="text-align:center;background:var(--gray50);border-radius:12px;padding:14px 8px;border:1px solid var(--gray200);">
            ${makeSVGGauge(v, color, 64)}
            <div style="font-size:9px;font-weight:700;color:var(--gray600);margin-top:4px;">${k}</div>
          </div>`;
        }).join('')}
      </div>

      <!-- 섹션 진행 현황 -->
      <div class="rpt-section-title">Consultation Progress</div>
      <div class="checklist-grid">
        ${sections.map(s => {
          const isDone = FS.isDone(c.id, s.id);
          return `<div class="check-chip ${isDone?'done':'todo'}" onclick="location.href='${s.file}'" style="cursor:pointer;">
            <div class="check-icon">${isDone ? '✅' : s.icon}</div>
            <div><div class="check-name">${s.name}</div>
            <div class="check-status">${isDone ? '설계 완료' : '미완료'}</div></div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- 1페이지 하단 상담직원 -->
    <div style="padding:0 20px 12px;">
      <div class="advisor-card" id="advisorCard1">
        <div class="advisor-info">
          <div class="advisor-avatar">👤</div>
          <div>
            <div style="font-size:9px;letter-spacing:1px;color:rgba(255,255,255,.5);font-weight:600;">FINANCIAL CONSULTANT</div>
            <div class="advisor-name" id="adv-display-name">${adv.name} ${adv.title}</div>
            <div class="advisor-role">메타리치 시그널그룹 · ${adv.cert || 'AFPK'}</div>
            <div class="advisor-contact" id="adv-display-phone">${adv.phone || '연락처 입력 필요'}</div>
          </div>
        </div>
        <div class="advisor-sign">
          <div class="sign-label">고객 확인 서명</div>
          <div class="sign-line"></div>
          <div class="sign-date">상담일: ${new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'})}</div>
          <div class="next-meeting">다음 미팅: <strong style="color:rgba(255,255,255,.85);" id="adv-display-next">${nextDate}</strong></div>
        </div>
      </div>
    </div>
  </div><!-- /PAGE 1 -->


  <!-- ══════════ PAGE 2: 현재 vs 개선 후 인포그래픽 ══════════ -->
  <div class="rpt-page">
    <div class="page-hero" style="background:linear-gradient(135deg,#0f1e3c 0%,#1e3a5f 40%,#0d9488 100%);">
      <div class="hero-eyebrow">Before &amp; After Analysis</div>
      <div class="hero-title">재무설계 전 · 후 비교</div>
      <div class="hero-sub">현재 상태와 재무설계 완성 후의 기대 변화를 한눈에 확인하세요</div>
    </div>

    <div class="rpt-body">

      <!-- Before / After 6개 항목 비교 -->
      <div class="rpt-section-title">Status Comparison</div>
      <div class="info-grid-3" style="margin-bottom:8px;">
        ${[
          {label:'월 연금 납입', before: pensionM ? fw(pensionM) : '납입 없음', after: pensionM ? fw(pensionM)+' 유지' : '설계 시 최적화', icon:'🌅', color:'#0d9488'},
          {label:'연간 세액공제 환급', before:'0원 (미신청)', after: taxCredit ? fw(taxCredit)+'/년' : '최대 '+fw(Math.round(income*taxRate*0.9)), icon:'💸', color:'#f59e0b'},
          {label:'30년 후 월 연금', before: fw(retire_before), after: fw(retire_after), icon:'🏖️', color:'#2563eb'},
          {label:'보험 보장 구성', before:'미파악 상태', after:'실손·3대질병·연금 완비', icon:'🛡️', color:'#7c3aed'},
          {label:'투자 포트폴리오', before:'무방향 저축', after: investment.profile || '성향별 최적 배분', icon:'📈', color:'#059669'},
          {label:'노후 소득 충족률', before: Math.round((national_est + retire_before) / (income*0.6/12) * 100) + '%', after: Math.round((national_est + retire_after) / (income*0.6/12) * 100) + '%', icon:'📊', color:'#ef4444'},
        ].map(item => `
          <div style="border-radius:8px;overflow:hidden;border:1.5px solid var(--gray200);">
            <div style="background:${item.color}18;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid ${item.color}30;">
              <span style="font-size:9px;">${item.icon}</span>
              <span style="font-size:9px;font-weight:700;color:${item.color};letter-spacing:.3px;">${item.label}</span>
            </div>
            <div style="padding:12px 16px;background:#fff;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                <span style="font-size:9px;font-weight:700;color:#be123c;background:#fff1f2;padding:2px 8px;border-radius:99px;">현재</span>
                <span style="font-size:9px;font-weight:700;color:#be123c;text-decoration:line-through;opacity:.7;">${item.before}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:9px;font-weight:700;color:#15803d;background:#f0fdf4;padding:2px 8px;border-radius:99px;">설계 후</span>
                <span style="font-family:'Barlow',sans-serif;font-size:9px;font-weight:900;color:${item.color};">${item.after}</span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- 기대효과 컬러 인포 카드 -->
      <div class="rpt-section-title">Expected Impact</div>
      <div class="effect-infos">
        ${[
          {color:'linear-gradient(135deg,#1a56db,#0ea5e9)', label:'10년 세액공제 누적', before:'0원', after: fw(taxCredit*10) || '최대 1,485만원', diff:'↑ 매년 자동 환급'},
          {color:'linear-gradient(135deg,#0d9488,#10b981)', label:'연금 월 수령 증가', before: fw(retire_before), after: fw(retire_after), diff:'↑ '+ fw(retire_after - retire_before)+' 증가'},
          {color:'linear-gradient(135deg,#7c3aed,#a855f7)', label:'ISA 5년 비과세', before:'0원', after:'200~400만원', diff:'↑ 9.9% 분리과세 vs 0%'},
          {color:'linear-gradient(135deg,#f59e0b,#f97316)', label:'보험 위험 차단', before:'보장 공백', after:'3대 위험 완전 차단', diff:'↑ 질병·사고 재정 충격 0'},
          {color:'linear-gradient(135deg,#059669,#34d399)', label:'투자 포트폴리오', before:'무방향', after: investment.profile || '성향 맞춤 배분', diff:'↑ 목적별 자산 최적화'},
          {color:'linear-gradient(135deg,#dc2626,#f97316)', label:'노후 소득 충족률', before: Math.round((national_est + retire_before)/(income*0.6/12)*100)+'%', after: Math.round((national_est + retire_after)/(income*0.6/12)*100)+'%', diff:'↑ 3층 연금 구조 완성'},
        ].map(ei => `
          <div class="effect-info" style="background:${ei.color};color:#fff;">
            <div class="ei-label">${ei.label}</div>
            <div class="ei-before">${ei.before}</div>
            <div class="ei-after">${ei.after}</div>
            <div class="ei-diff">${ei.diff}</div>
          </div>
        `).join('')}
      </div>

      <!-- 노후 소득 비교 시각화 -->
      <div class="rpt-section-title">Retirement Income Simulation</div>
      <div class="income-compare">
        <div class="income-box before">
          <div class="income-title" style="color:#be123c;">⚠️ 현재 방향으로 간다면</div>
          ${iRow('국민연금 (예상)', national_est, '#ef4444', Math.max(national_est,retire_after)*1.1)}
          ${iRow('개인연금 (현재)', retire_before, '#f97316', Math.max(national_est,retire_after)*1.1)}
          ${iRow('퇴직금 월환산', Math.round(income*0.3/240), '#fbbf24', Math.max(national_est,retire_after)*1.1)}
          <div class="income-total" style="background:rgba(220,38,38,.1);">
            <div class="income-total-val" style="color:#be123c;">${fw(national_est + retire_before + Math.round(income*0.3/240))}</div>
            <div class="income-total-label" style="color:#be123c;">예상 월 노후 소득</div>
          </div>
        </div>
        <div class="income-box after">
          <div class="income-title" style="color:#15803d;">✅ 재무설계 완성 후</div>
          ${iRow('국민연금 (예상)', national_est, '#059669', Math.max(national_est,retire_after)*1.1)}
          ${iRow('개인연금 (설계)', retire_after, '#0d9488', Math.max(national_est,retire_after)*1.1)}
          ${iRow('퇴직금 월환산', Math.round(income*0.5/240), '#10b981', Math.max(national_est,retire_after)*1.1)}
          <div class="income-total" style="background:rgba(5,150,105,.1);">
            <div class="income-total-val" style="color:#15803d;">${fw(national_est + retire_after + Math.round(income*0.5/240))}</div>
            <div class="income-total-label" style="color:#15803d;">예상 월 노후 소득</div>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /PAGE 2 -->


  <!-- ══════════ PAGE 3: 시뮬레이션 + 액션플랜 ══════════ -->
  <div class="rpt-page">
    <div class="page-hero" style="background:linear-gradient(135deg,#1e1b4b 0%,#2563eb 50%,#7c3aed 100%);">
      <div class="hero-eyebrow">Simulation &amp; Action Plan</div>
      <div class="hero-title">연금 적립 시뮬레이션 &amp; 실행 계획</div>
      <div class="hero-sub">지금 시작하면 ${c.age+10}세에 이미 의미 있는 변화가 시작됩니다</div>
    </div>

    <div class="rpt-body">

      <!-- 연금 적립 차트 + 통계 -->
      <div class="rpt-section-title">Pension Accumulation Chart</div>
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:8px;margin-bottom:8px;align-items:start;">
        <div>
          <canvas id="pensionChart" height="130"></canvas>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${[
            {label:'월 납입액', val: pensionM ? fw(pensionM) : '미설계', color:'#2563eb'},
            {label:'30년 후 적립금', val: pensionM ? fw(fv30_after) : '-', color:'#0d9488'},
            {label:'월 수령액 (25년)', val: pensionM ? fw(retire_after) : '-', color:'#7c3aed'},
            {label:'연간 세액공제', val: taxCredit ? fw(taxCredit) : '-', color:'#f59e0b'},
          ].map(stat => `
            <div style="background:var(--gray50);border-radius:6px;padding:12px 14px;border:1px solid var(--gray200);">
              <div style="font-size:9px;font-weight:700;color:var(--gray400);letter-spacing:.3px;">${stat.label}</div>
              <div style="font-family:'Barlow',sans-serif;font-size:20px;font-weight:900;color:${stat.color};margin-top:2px;">${stat.val}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- 액션 타임라인 -->
      <div class="rpt-section-title">Next Steps — Action Plan</div>
      <div class="action-track">
        ${[
          {period:'즉시 실행', icon:'🔴', dot:'#ef4444', title:'증권 수집 & 보험 점검', desc:'현재 납입 보험 목록 요청, 보장 공백 파악'},
          {period:'1개월 내', icon:'🟠', dot:'#f97316', title:'연금저축·IRP 개설', desc:'자동이체 설정, 세액공제 즉시 시작'},
          {period:'3개월 내', icon:'🟡', dot:'#f59e0b', title:'ISA + 보험 리모델링', desc:'비과세 통장 개설, 보장 최적화 완료'},
          {period:'연말 전', icon:'🟢', dot:'#10b981', title:'연말정산 서류 준비', desc: taxCredit ? fw(taxCredit)+' 환급 신청' : '세액공제 서류 발급'},
        ].map(a => `
          <div class="action-node">
            <div class="action-dot" style="background:${a.dot};">${a.icon}</div>
            <div style="display:flex;flex-direction:column;gap:4px;width:100%;">
              <div class="action-period">${a.period}</div>
              <div class="action-title">${a.title}</div>
              <div class="action-desc">${a.desc}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- 핵심 메시지 배너 -->
      <div style="background:linear-gradient(135deg,var(--navy),#1a3a6e);border-radius:8px;padding:10px 16px;color:#fff;margin-bottom:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 14px;">
        ${[
          {icon:'💡', msg:'"투자는 선택이지만,<br>위험 대비는 필수입니다"'},
          {icon:'🛡️', msg:'"보험이 없는 재무설계는<br>완성되지 않은 계획입니다"'},
          {icon:'📈', msg:'"지금 시작하는 한 걸음이<br>노후를 완전히 바꿉니다"'},
        ].map(m => `
          <div style="text-align:center;padding:8px;">
            <div style="font-size:20px;margin-bottom:8px;">${m.icon}</div>
            <div style="font-size:9px;color:rgba(255,255,255,.85);line-height:1.6;">${m.msg}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- 3페이지 하단 상담직원 -->
    <div style="padding:0 20px 12px;">
      <div class="advisor-card" id="advisorCard3">
        <div class="advisor-info">
          <div class="advisor-avatar">👤</div>
          <div>
            <div style="font-size:9px;letter-spacing:1px;color:rgba(255,255,255,.5);font-weight:600;">FINANCIAL CONSULTANT · MetaRich Signal Group</div>
            <div class="advisor-name">${adv.name} ${adv.title} ${adv.cert ? '· '+adv.cert : ''}</div>
            <div class="advisor-contact">${adv.phone || '연락처를 위에서 입력하세요'}</div>
          </div>
        </div>
        <div style="display:flex;gap:40px;align-items:center;">
          <div style="text-align:center;">
            <div style="font-size:9px;color:rgba(255,255,255,.5);margin-bottom:4px;">다음 미팅</div>
            <div style="font-family:'Barlow',sans-serif;font-size:9px;font-weight:700;">${nextDate}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:9px;color:rgba(255,255,255,.5);">고객 서명</div>
            <div style="width:160px;height:1px;background:rgba(255,255,255,.3);margin:8px 0;"></div>
            <div style="font-size:9px;color:rgba(255,255,255,.4);">                                              (인)</div>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /PAGE 3 -->

  `;

  // 차트 그리기
  setTimeout(() => drawCharts(c, pensionM, pension, retire_before, retire_after), 80);
}

/* ── 소득 행 SVG 바 ── */
function iRow(label, val, color, max) {
  const pct = Math.min(val / (max || 1), 1) * 100;
  return `<div class="income-row">
    <span style="color:var(--gray600);">${label}</span>
    <span style="font-weight:700;font-family:'Barlow',sans-serif;font-size:9px;color:${color};">${fw(val)}</span>
  </div>
  <div style="margin:-4px 0 6px;height:5px;background:#e2e8f0;border-radius:99px;overflow:hidden;">
    <div style="width:${pct}%;height:100%;background:${color};border-radius:99px;"></div>
  </div>`;
}

/* ── 차트 ── */
let _charts = {};
function drawCharts(c, monthly, pension, retireBefore, retireAfter) {
  Object.values(_charts).forEach(ch => { try { ch.destroy(); } catch(e){} });
  _charts = {};

  // 연금 적립 라인 차트
  const ctx1 = document.getElementById('pensionChart');
  if (ctx1 && monthly > 0) {
    const penAge = +pension.pensionAge || 65;
    const curAge = c.age || 40;
    const mr = 0.04 / 12;
    const years = Array.from({length: penAge - curAge + 1}, (_, i) => i);
    _charts.p = new Chart(ctx1, {
      type: 'line',
      data: {
        labels: years.map(y => (curAge + y) + '세'),
        datasets: [
          {
            label: '설계 후 적립금',
            data: years.map(y => Math.round(monthly * ((Math.pow(1 + mr, y * 12) - 1) / mr) / 10000)),
            borderColor: '#1a56db', backgroundColor: 'rgba(26,86,219,.08)',
            fill: true, tension: 0.45, pointRadius: 2, borderWidth: 2,
          },
          {
            label: '순수 납입액',
            data: years.map(y => Math.round(monthly * y * 12 / 10000)),
            borderColor: '#94a3b8', borderDash: [5, 5],
            fill: false, tension: 0, pointRadius: 0, borderWidth: 1.5,
          }
        ]
      },
      options: {
        plugins: {
          legend: { position: 'bottom', labels: { font: { family: 'Noto Sans KR', size: 10 }, boxWidth: 10, padding: 12 } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 10 }, maxTicksLimit: 10 } },
          y: {
            grid: { color: 'rgba(0,0,0,.04)' },
            ticks: { font: { size: 10 }, callback: v => v >= 10000 ? Math.floor(v / 10000).toLocaleString() + '억' : v.toLocaleString() + '만' }
          }
        }
      }
    });
  }
}

/* ── 어드바이저 정보 실시간 갱신 ── */
function refreshAdvisor() {
  const adv = getAdvisor();
  localStorage.setItem('fs_advisor', JSON.stringify(adv));
  const nameEls  = document.querySelectorAll('#adv-display-name');
  const phoneEls = document.querySelectorAll('#adv-display-phone');
  const nextEls  = document.querySelectorAll('#adv-display-next');
  const nextDate = adv.nextdate ? new Date(adv.nextdate).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}) : '일정 미정';
  nameEls.forEach(el => el.textContent = adv.name + ' ' + adv.title);
  phoneEls.forEach(el => el.textContent = adv.phone || '연락처 입력 필요');
  nextEls.forEach(el => el.textContent = nextDate);
  // 풀 리제너레이션 (헤더 담당직원 이름 반영)
  const c = FS.getActive();
  if (c) generateReport(c);
}

/* ── JSON 내보내기 ── */
function exportClient() {
  const c = FS.getActive();
  if (!c) { alert('고객을 선택하세요'); return; }
  const today = new Date().toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}).replace(/\. /g,'').replace('.','');
  const blob  = new Blob([JSON.stringify(c, null, 2)], { type: 'application/json' });
  const a     = document.createElement('a');
  a.href      = URL.createObjectURL(blob);
  a.download  = `${c.name}_${today}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
