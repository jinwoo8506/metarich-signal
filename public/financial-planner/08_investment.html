<style>
/* 설문 */
.survey-step{display:none;animation:fadeIn .3s ease;}
.survey-step.active{display:block;}
.q-num{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:6px;}
.q-text{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:20px;line-height:1.5;}
.answer-list{display:flex;flex-direction:column;gap:10px;}
.answer-btn{padding:14px 18px;border-radius:var(--radius-sm);border:1.5px solid var(--gray200);
  background:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:13px;
  cursor:pointer;transition:.18s;text-align:left;color:var(--gray800);line-height:1.5;}
.answer-btn:hover{border-color:var(--primary-mid);background:#eff6ff;color:var(--primary);}
.answer-btn.selected{border-color:var(--primary-mid);background:#eff6ff;color:var(--primary);font-weight:700;}

.progress-bar{height:6px;background:var(--gray200);border-radius:99px;margin-bottom:24px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary-mid));border-radius:99px;transition:width .4s;}

/* 결과 */
.risk-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;
  border-radius:99px;font-size:15px;font-weight:700;margin-bottom:16px;}
.portfolio-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px;}
.pf-asset{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--gray200);margin-bottom:8px;font-size:13px;}
.pf-asset-bar{height:6px;background:var(--gray200);border-radius:99px;overflow:hidden;margin-top:4px;}
.pf-asset-fill{height:100%;border-radius:99px;}

.fund-list{display:flex;flex-direction:column;gap:8px;}
.fund-item{padding:12px 16px;border-radius:var(--radius-sm);background:var(--gray100);
  border-left:4px solid transparent;font-size:12px;}
.fund-item-name{font-size:13px;font-weight:700;color:var(--gray800);margin-bottom:2px;}
.fund-item-tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-right:4px;}

.risk-levels{display:flex;gap:0;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:20px;}
.risk-level{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;}
</style>

/* ── 설문 로직 ── */
let qIdx = 0;
let scores = [];
let selected = null;

function renderQ() {
  const q = QUESTIONS[qIdx];
  const pct = Math.round((qIdx+1)/QUESTIONS.length*100);
  document.getElementById('qProgress').textContent = qIdx+1;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('prevBtn').style.display = qIdx>0 ? 'inline-flex' : 'none';
  document.getElementById('nextBtn').style.display = 'none';
  selected = scores[qIdx] !== undefined ? scores[qIdx] : null;

  document.getElementById('surveyArea').innerHTML = `
    <div class="q-num">질문 ${qIdx+1} / ${QUESTIONS.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="answer-list">
      ${q.answers.map((a,i)=>`
        <button class="answer-btn ${selected===a.score?'selected':''}"
          onclick="selectAnswer(${a.score},this)">${a.text}</button>
      `).join('')}
    </div>
  `;
  if(selected !== null) document.getElementById('nextBtn').style.display = 'inline-flex';
}

function selectAnswer(score, btn) {
  document.querySelectorAll('.answer-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = score;
  scores[qIdx] = score;
  document.getElementById('nextBtn').style.display = 'inline-flex';
}

function nextQ() {
  if(selected===null) return;
  scores[qIdx] = selected;
  if(qIdx < QUESTIONS.length-1) {
    qIdx++;
    selected = scores[qIdx] !== undefined ? scores[qIdx] : null;
    renderQ();
  } else {
    showResult();
  }
}

function prevQ() {
  if(qIdx>0) { qIdx--; selected=scores[qIdx]||null; renderQ(); }
}

function showResult() {
  const total = scores.reduce((s,v)=>s+v, 0);
  const max   = QUESTIONS.length * 4;
  const pct   = total / max;
  let level;
  if(pct <= 0.25)      level = 1;
  else if(pct <= 0.45) level = 2;
  else if(pct <= 0.60) level = 3;
  else if(pct <= 0.80) level = 4;
  else                  level = 5;

  const profile = RISK_PROFILES[level-1];
  document.getElementById('surveyCard').style.display = 'none';
  document.getElementById('resultSection').style.display = 'block';

  const alloc = profile.allocation;
  const allocHtml = Object.entries(alloc).map(([k,v])=>`
    <div class="pf-asset">
      <span style="font-weight:600;color:var(--gray700);">${k}</span>
      <span style="font-weight:700;font-size:15px;color:${profile.color};">${v}%</span>
    </div>
    <div class="pf-asset-bar">
      <div class="pf-asset-fill" style="width:${v}%;background:${profile.color};"></div>
    </div>
  `).join('');

  document.getElementById('riskResult').innerHTML = `
    <div class="risk-badge" style="background:${profile.bg};color:${profile.color};border:1.5px solid ${profile.border};">
      📊 투자성향: <strong>${profile.label}</strong> (${level}등급 수준)
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--gray600);margin-bottom:12px;">자산 배분 가이드</div>
        ${allocHtml}
      </div>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--gray600);margin-bottom:10px;">적합 상품 유형</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${profile.products.map(p=>`
            <div style="padding:8px 12px;background:var(--gray100);border-radius:var(--radius-sm);font-size:12px;color:var(--gray700);">
              ✅ ${p}
            </div>
          `).join('')}
        </div>
        <div style="margin-top:10px;padding:10px;background:${profile.bg};border-radius:var(--radius-sm);font-size:12px;color:${profile.color};">
          최대 투자 가능 위험등급: <strong>${profile.maxRisk}</strong>
        </div>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="restartSurvey()">🔄 다시 설문하기</button>
    </div>
  `;

  // 저장용 성향 데이터 기록
  window._investLevel = level;
  window._investProfile = profile;

  // 자동으로 포트폴리오 빌드 시작
  if(client && client.monthly) {
    document.getElementById('inv-monthly').value = client.monthly;
    buildInvPortfolio();
  }
  showRiskLevel(6, document.querySelector('.risk-level'));
}

function restartSurvey() {
  qIdx=0; scores=[]; selected=null;
  document.getElementById('surveyCard').style.display='block';
  document.getElementById('resultSection').style.display='none';
  renderQ();
}

/* ── 포트폴리오 빌드 ── */
let invChart = null;
function buildInvPortfolio() {
  const budget  = parseFloat(document.getElementById('inv-monthly').value)||0;
  const period  = parseInt(document.getElementById('inv-period').value)||10;
  const purpose = document.getElementById('inv-purpose').value;
  const profile = window._investProfile;
  if(!budget || !profile) return;
  const m = Math.round(budget/10000);

  document.getElementById('portfolioCard').style.display = 'block';

  const purposeLabel = {saving:'목돈 마련',retire:'노후 준비',income:'배당 수익',growth:'자산 성장'}[purpose];
  const alloc = profile.allocation;
  const entries = Object.entries(alloc).filter(([,v])=>v>0);
  const colors  = ['#2563eb','#059669','#f59e0b','#7c3aed','#ef4444','#0d9488'];

  let html = `
    <div style="padding:14px;background:${profile.bg};border-radius:var(--radius-sm);margin-bottom:16px;border-left:4px solid ${profile.color};">
      <div style="font-size:14px;font-weight:700;color:${profile.color};">${profile.label} · ${purposeLabel} · ${period}년</div>
    </div>
    <div style="display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start;">
      <div>
        <canvas id="invPieChart" width="250" height="250"></canvas>
        <div style="margin-top:12px;display:flex;flex-direction:column;gap:6px;">
          ${entries.map(([k,v],i)=>`
            <div style="display:flex;align-items:center;gap:8px;font-size:12px;">
              <div style="width:10px;height:10px;border-radius:50%;background:${colors[i]};flex-shrink:0;"></div>
              <span style="flex:1;color:var(--gray600);">${k}</span>
              <span style="font-weight:700;">${Math.round(m*v/100).toLocaleString()}만원</span>
              <span style="color:var(--gray400);">(${v}%)</span>
            </div>
          `).join('')}
        </div>
      </div>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--gray600);margin-bottom:10px;">📈 ${period}년 적립 시뮬레이션</div>
        <canvas id="invLineChart" height="180"></canvas>
        <div style="margin-top:12px;padding:12px;background:var(--gray100);border-radius:var(--radius-sm);font-size:12px;color:var(--gray600);">
          💡 월 <strong>${m.toLocaleString()}만원</strong> × ${period}년 적립 기준 | 기대수익률 ${profile.level <= 2 ? '3.5~4' : profile.level === 3 ? '5~6' : profile.level === 4 ? '6~8' : '8~10'}%
        </div>
      </div>
    </div>
    <div style="margin-top:16px;">
      <div style="font-size:13px;font-weight:700;color:var(--gray600);margin-bottom:10px;">추천 상품</div>
      <div class="fund-list">
        ${profile.products.map((p,i)=>`
          <div class="fund-item" style="border-left-color:${colors[i]||'#94a3b8'};">
            <div class="fund-item-name">${p}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('portfolioContent').innerHTML = html;

  // 파이 차트
  setTimeout(()=>{
    const pieCtx = document.getElementById('invPieChart');
    if(pieCtx) {
      if(window._invPieChart) window._invPieChart.destroy();
      window._invPieChart = new Chart(pieCtx, {
        type:'doughnut',
        data:{
          labels:entries.map(([k])=>k),
          datasets:[{data:entries.map(([,v])=>v),backgroundColor:colors.slice(0,entries.length),borderWidth:0,hoverOffset:6}]
        },
        options:{cutout:'60%',plugins:{legend:{display:false}}}
      });
    }

    // 라인 차트
    const lineCtx = document.getElementById('invLineChart');
    if(lineCtx) {
      const rates = {1:0.035,2:0.04,3:0.055,4:0.07,5:0.09};
      const rate  = rates[profile.level]||0.05;
      const mr    = rate/12;
      const years = Array.from({length:period+1},(_,i)=>i);
      if(invChart) invChart.destroy();
      invChart = new Chart(lineCtx,{
        type:'line',
        data:{
          labels:years.map(y=>y+'년'),
          datasets:[
            {label:'적립 후 예상액',data:years.map(y=>Math.round(budget*((Math.pow(1+mr,y*12)-1)/mr)/10000)),borderColor:profile.color,backgroundColor:profile.color+'18',fill:true,tension:.4,pointRadius:3},
            {label:'순수 납입액',data:years.map(y=>Math.round(budget*y*12/10000)),borderColor:'#94a3b8',borderDash:[4,4],fill:false,tension:.0,pointRadius:0}
          ]
        },
        options:{plugins:{legend:{position:'bottom',labels:{font:{family:'Noto Sans KR',size:11},boxWidth:10}}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:6}},y:{ticks:{callback:v=>v>=10000?Math.floor(v/10000)+'억':v.toLocaleString()+'만'}}}}
      });
    }
  }, 100);
}

/* ── 위험등급 안내 ── */
function showRiskLevel(level, el) {
  document.querySelectorAll('.risk-level').forEach(r=>r.style.opacity='0.5');
  el.style.opacity='1';
  const info = RISK_LEVELS_INFO[level];
  document.getElementById('riskLevelContent').innerHTML = `
    <div style="padding:14px;background:${info.color}12;border-radius:var(--radius-sm);margin-bottom:12px;border-left:4px solid ${info.color};">
      <div style="font-size:14px;font-weight:700;color:${info.color};">${level}등급 — ${info.label}</div>
      <div style="font-size:12px;color:var(--gray600);margin-top:3px;">${info.desc}</div>
    </div>
    <div class="fund-list">
      ${info.products.map(p=>`
        <div class="fund-item" style="border-left-color:${p.color};">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="fund-item-tag" style="background:${p.color}18;color:${p.color};">${p.tag}</span>
            <span class="fund-item-name">${p.name}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function saveInvestment() {
  if(!client){alert('고객을 먼저 선택하세요');return;}
  FS.saveSection(client.id,'investment',{
    level: window._investLevel,
    profile: window._investProfile ? window._investProfile.label : '',
    memo: document.getElementById('save-memo').value
  });
  FS.markDone(client.id,'investment');
  alert('✅ 투자설계가 저장되었습니다');
}

// 초기 설문 렌더링
renderQ();
</script>
</body>
</html>
