<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수술비 보험금 계산기</title>
<style>
  :root {
    --blue-dark: #1e3a5f;
    --blue-mid: #2563eb;
    --blue-light: #dbeafe;
    --blue-pale: #eff6ff;
    --slate: #475569;
    --slate-light: #94a3b8;
    --red: #dc2626;
    --red-light: #fef2f2;
    --red-border: #fca5a5;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --amber: #d97706;
    --amber-light: #fffbeb;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --text-dark: #0f172a;
    --text-mid: #334155;
    --shadow: 0 4px 24px rgba(30,58,95,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: linear-gradient(160deg, #e8f0fb 0%, #f0f4ff 50%, #e8f5ee 100%);
    min-height: 100vh;
    color: var(--text-dark);
    font-size: 18px;
  }

  .header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, #1e4d8c 100%);
    color: white;
    padding: 32px 24px 28px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(30,58,95,0.25);
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 1rem;
    opacity: 0.82;
    font-weight: 400;
  }

  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }

  /* ─── 검색 섹션 ─── */
  .search-section {
    background: white;
    border-radius: 18px;
    padding: 28px 28px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .section-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--blue-mid);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .search-input {
    flex: 1;
    font-size: 1.15rem;
    padding: 14px 18px;
    border: 2.5px solid var(--gray-200);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s;
    color: var(--text-dark);
    background: var(--gray-50);
    font-family: inherit;
  }
  .search-input:focus {
    border-color: var(--blue-mid);
    background: white;
  }
  .search-btn {
    padding: 14px 26px;
    background: var(--blue-mid);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    font-family: inherit;
    white-space: nowrap;
  }
  .search-btn:hover { background: #1d4ed8; transform: translateY(-1px); }

  /* ─── 자동완성 드롭다운 ─── */
  .search-wrap { position: relative; flex: 1; }
  .autocomplete-box {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: white;
    border: 2px solid var(--blue-mid);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(30,58,95,0.18);
    z-index: 999;
    overflow: hidden;
    max-height: 400px;
    overflow-y: auto;
  }
  .autocomplete-box.open { display: block; }
  .ac-item {
    display: flex;
    align-items: center;
    padding: 13px 18px;
    gap: 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--gray-100);
    transition: background 0.13s;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.highlighted { background: var(--blue-pale); }
  .ac-type-pill {
    flex-shrink: 0;
    width: 46px;
    height: 46px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1rem;
    line-height: 1.1;
  }
  .ac-type-pill .pill-num { font-size: 1.3rem; }
  .ac-type-pill .pill-jong { font-size: 0.75rem; opacity: 0.85; }
  .ac-pill-1 { background: #e0f2fe; color: #0369a1; }
  .ac-pill-2 { background: #dcfce7; color: #15803d; }
  .ac-pill-3 { background: #fef9c3; color: #a16207; }
  .ac-pill-4 { background: #fed7aa; color: #c2410c; }
  .ac-pill-5 { background: #fce7f3; color: #be185d; }
  .ac-pill-c { background: #fee2e2; color: #b91c1c; }
  .ac-info { flex: 1; min-width: 0; }
  .ac-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ac-name mark {
    background: #fef08a;
    color: var(--text-dark);
    border-radius: 3px;
    padding: 0 1px;
    font-weight: 800;
  }
  .ac-sub {
    font-size: 0.88rem;
    color: var(--slate);
    margin-top: 2px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .ac-kcd {
    background: var(--gray-100);
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--slate);
  }
  .ac-cancer-tag {
    background: #fee2e2;
    color: #b91c1c;
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 0.82rem;
    font-weight: 700;
  }
  .ac-arrow {
    flex-shrink: 0;
    color: var(--slate-light);
    font-size: 1.1rem;
  }
  .ac-header {
    padding: 8px 18px 6px;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--blue-mid);
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--blue-pale);
    border-bottom: 1px solid var(--gray-200);
  }
  .ac-empty {
    padding: 22px 18px;
    text-align: center;
    color: var(--slate-light);
    font-size: 1rem;
  }

  /* ─── 부위 퀵 선택 ─── */
  .quick-label {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-mid);
    margin-bottom: 10px;
  }
  .filter-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 0;
  }
  .tab-btn {
    padding: 8px 18px;
    border-radius: 30px;
    border: 2px solid var(--gray-200);
    background: var(--gray-50);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--slate);
    font-family: inherit;
  }
  .tab-btn:hover { border-color: var(--blue-mid); color: var(--blue-mid); background: var(--blue-pale); }
  .tab-btn.active { background: var(--blue-mid); color: white; border-color: var(--blue-mid); }
  .tab-btn.cancer-tab { border-color: #dc2626; color: #dc2626; }
  .tab-btn.cancer-tab:hover { background: #fef2f2; }
  .tab-btn.cancer-tab.active { background: #dc2626; color: white; border-color: #dc2626; }

  /* ─── 가입금액 입력 ─── */
  .amount-section {
    background: white;
    border-radius: 18px;
    padding: 24px 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .amount-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 14px;
  }
  @media(max-width:600px){ .amount-grid { grid-template-columns: 1fr; } }
  .amount-field label {
    display: block;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-mid);
    margin-bottom: 7px;
  }
  .amount-field label span {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--slate-light);
    margin-left: 4px;
  }
  .amount-input-wrap {
    display: flex;
    align-items: center;
    border: 2.5px solid var(--gray-200);
    border-radius: 12px;
    overflow: hidden;
    background: var(--gray-50);
    transition: border-color 0.2s;
  }
  .amount-input-wrap:focus-within {
    border-color: var(--blue-mid);
    background: white;
  }
  .amount-input {
    flex: 1;
    padding: 13px 14px;
    font-size: 1.15rem;
    border: none;
    background: transparent;
    outline: none;
    color: var(--text-dark);
    font-weight: 600;
    font-family: inherit;
    text-align: right;
  }
  .amount-unit {
    padding: 0 14px 0 4px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--slate);
  }

  /* ─── 결과 영역 ─── */
  .results-area { display: none; }
  .results-area.visible { display: block; }

  .result-card {
    background: white;
    border-radius: 18px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .result-card:hover { border-color: var(--blue-mid); box-shadow: 0 8px 32px rgba(37,99,235,0.13); }
  .result-card.selected { border-color: var(--blue-mid); box-shadow: 0 8px 32px rgba(37,99,235,0.18); }

  .card-header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1.5px solid var(--gray-100);
  }
  .card-name {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text-dark);
    margin-bottom: 4px;
  }
  .card-meta {
    font-size: 0.95rem;
    color: var(--slate);
    line-height: 1.5;
  }
  .card-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.88rem;
    font-weight: 700;
  }
  .badge-1 { background: #e0f2fe; color: #0369a1; }
  .badge-2 { background: #dcfce7; color: #15803d; }
  .badge-3 { background: #fef9c3; color: #a16207; }
  .badge-4 { background: #fed7aa; color: #c2410c; }
  .badge-5 { background: #fce7f3; color: #be185d; }
  .badge-cancer { background: #fee2e2; color: #b91c1c; }
  .badge-special { background: #f3e8ff; color: #7c3aed; }
  .badge-general { background: var(--gray-100); color: var(--slate); }

  /* ─── 지급액 강조 ─── */
  .payout-panel {
    background: linear-gradient(135deg, var(--blue-dark) 0%, #1e4d8c 100%);
    color: white;
    padding: 22px 24px;
    text-align: center;
  }
  .payout-label {
    font-size: 0.95rem;
    opacity: 0.75;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .payout-amount {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -1px;
    color: #fbbf24;
  }
  .payout-breakdown {
    font-size: 0.9rem;
    opacity: 0.80;
    margin-top: 6px;
  }

  /* ─── 카드 상세 ─── */
  .card-detail {
    padding: 18px 24px 20px;
  }
  .detail-row {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 1rem;
    line-height: 1.6;
  }
  .detail-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .detail-text { color: var(--text-mid); }
  .detail-text strong { color: var(--text-dark); }

  /* ─── 부지급 경고 박스 ─── */
  .no-pay-box {
    background: var(--red-light);
    border: 2px solid var(--red-border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-top: 14px;
  }
  .no-pay-title {
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--red);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .no-pay-list {
    list-style: none;
    padding: 0;
  }
  .no-pay-list li {
    font-size: 1rem;
    color: #7f1d1d;
    padding: 3px 0;
    display: flex;
    gap: 8px;
    line-height: 1.5;
  }
  .no-pay-list li::before { content: "⛔"; font-size: 0.9rem; flex-shrink: 0; margin-top: 2px; }

  /* ─── 암 수술 섹션 ─── */
  .cancer-section-header {
    background: linear-gradient(135deg, #7f1d1d, #dc2626);
    color: white;
    border-radius: 14px;
    padding: 16px 22px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
    font-weight: 800;
  }

  /* ─── 빈 결과 ─── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--slate-light);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 14px; }
  .empty-state p { font-size: 1.05rem; }

  /* ─── 안내문구 ─── */
  .disclaimer {
    background: var(--amber-light);
    border: 2px solid #fde68a;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 0.95rem;
    color: #78350f;
    margin-top: 24px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    line-height: 1.6;
  }

  /* ─── 결과 타이틀 ─── */
  .results-title {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--text-mid);
    margin-bottom: 16px;
    padding-left: 4px;
  }
  .results-count {
    font-size: 1rem;
    font-weight: 500;
    color: var(--blue-mid);
  }

  /* 수술종 색상별 박스 */
  .type-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    font-size: 1.15rem;
    font-weight: 900;
    flex-shrink: 0;
  }
  .type-box-1 { background: #e0f2fe; color: #0369a1; }
  .type-box-2 { background: #dcfce7; color: #15803d; }
  .type-box-3 { background: #fef9c3; color: #a16207; }
  .type-box-4 { background: #fed7aa; color: #c2410c; }
  .type-box-5 { background: #fce7f3; color: #be185d; }
  .type-box-c { background: #fee2e2; color: #b91c1c; }
</style>
</head>
<body>

<div class="header">
  <h1>🏥 수술비 보험금 계산기</h1>
  <p>질병명 · KCD코드 · 수술 부위로 예상 보험금을 즉시 확인</p>
</div>

<div class="main">

  <!-- 검색 -->
  <div class="search-section">
    <div class="section-label">🔍 검색</div>
    <div class="search-row">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text"
               placeholder="예) 백내장, H25, 담낭, 위절제, 관상동맥..."
               oninput="onInputChange(this.value)"
               onkeydown="onInputKeydown(event)"
               autocomplete="off">
        <div class="autocomplete-box" id="acBox"></div>
      </div>
      <button class="search-btn" onclick="onSearch()">검색</button>
    </div>

    <div class="quick-label">🏷 부위별 빠른 선택</div>
    <div class="filter-tabs">
      <button class="tab-btn active" onclick="filterCategory('all', this)">전체</button>
      <button class="tab-btn" onclick="filterCategory('eye', this)">👁 눈·안과</button>
      <button class="tab-btn" onclick="filterCategory('digestive', this)">🫁 소화기</button>
      <button class="tab-btn" onclick="filterCategory('cardio', this)">❤️ 심장·혈관</button>
      <button class="tab-btn" onclick="filterCategory('ortho', this)">🦴 근골격</button>
      <button class="tab-btn" onclick="filterCategory('ent', this)">👂 귀·코·목</button>
      <button class="tab-btn" onclick="filterCategory('brain', this)">🧠 뇌·신경</button>
      <button class="tab-btn" onclick="filterCategory('uro', this)">🫀 비뇨·생식</button>
      <button class="tab-btn" onclick="filterCategory('breast', this)">유방·피부</button>
      <button class="tab-btn" onclick="filterCategory('thyroid', this)">갑상선·내분비</button>
      <button class="tab-btn cancer-tab" onclick="filterCategory('cancer', this)">🎗 암 수술</button>
    </div>
  </div>

  <!-- 가입금액 -->
  <div class="amount-section">
    <div class="section-label">💰 가입금액 입력</div>
    <div class="amount-grid">
      <div class="amount-field">
        <label>수술비(1~5종) 가입금액 <span>(종당)</span></label>
        <div class="amount-input-wrap">
          <input class="amount-input" id="surgeryAmt" type="number" value="1"
                 placeholder="1" oninput="recalcAll()">
          <span class="amount-unit">만원</span>
        </div>
      </div>
      <div class="amount-field">
        <label>질병수술비 가입금액 <span>(선택)</span></label>
        <div class="amount-input-wrap">
          <input class="amount-input" id="disAmt" type="number" value="0"
                 placeholder="0" oninput="recalcAll()">
          <span class="amount-unit">만원</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 결과 -->
  <div class="results-area" id="resultsArea">
    <div class="results-title" id="resultsTitle"></div>
    <div id="resultsList"></div>
    <div class="disclaimer">
      ⚠️ <span>이 내용은 예시이며 해당 상품의 <strong>증권과 약관을 다시 참조</strong>하시길 바랍니다. 가입 특약에 따라 지급 기준이 다를 수 있습니다.</span>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════
//  수술 DB (흥국생명 1~5종 분류표 + DB손해보험 약관 기준)
// ═══════════════════════════════════════════════════════════
const DB = [
  // ── 눈·안과 ──
  { id:1, name:'백내장 수술', kcd:'H25', category:'eye',
    type:1, label:'1종', isCancel:false, isCancer:false,
    desc:'수정체(백내장) 관혈수술 — 초음파 유화흡인술(phaco) 포함',
    notes:'단순 약물주입술·레이저 시력교정(라식·라섹) 제외',
    noPay:['안경·콘택트렌즈 대체 시력교정술', '단순 약물주입술', '레이저 시력교정(라식·라섹)'] },

  { id:2, name:'녹내장 관혈수술', kcd:'H40', category:'eye',
    type:3, label:'3종', isCancel:false, isCancer:false,
    desc:'섬유주절제술, 방수유출장치 삽입술 등 관혈적 녹내장 수술',
    notes:'레이저 섬유주성형술(ALT/SLT) 등 비관혈적 레이저 시술은 1종(레이저 안구수술)으로 분류',
    noPay:['안압하강제 약물치료', '단순 레이저 시술만 시행 시(→ 1종 적용)'] },

  { id:3, name:'망막박리 수술', kcd:'H33', category:'eye',
    type:2, label:'2종', isCancel:false, isCancer:false,
    desc:'공막돌륭술, 유리체절제술, 기체충전술 등 망막박리 수술',
    notes:'60일 이내 재수술은 1회로 간주',
    noPay:['레이저 광응고술만 단독 시행 시(→ 레이저 안구수술 1종)'] },

  { id:4, name:'레이저 안구수술', kcd:'H33-H36', category:'eye',

    noPay:['흡인·천자·약물주입만 시행', '항암제 투여 목적 중심정맥삽관술 단독'] },

  { id:102, name:'기타피부암 수술(C44)', kcd:'C44', category:'cancer',
    type:3, label:'3종', isCancel:false, isCancer:true,
    desc:'기타피부암(C44) 수술 — 관혈적 수술도 3종 (일반 암 근치수술과 구분)',
    notes:'',
    noPay:['미용 목적 피부병변 제거'] },

  { id:103, name:'조혈모세포(골수) 이식술', kcd:'C81-C96', category:'cancer',
    type:5, label:'5종', isCancel:false, isCancer:true,
    desc:'비고형암(혈액암) 비관혈적 근치술 → 5종 준용 / 조혈모세포 이식 일련 과정 1회 인정',
    notes:'추출·필터링·배양·제거·주입 전 과정 포함하여 1회 수술로 인정',
    noPay:['약물 투여 목적 중심정맥삽관술만 단독 시행 시 5종 불인정'] },

  { id:104, name:'암 근치 방사선 조사(5,000Rad↑)', kcd:'C00-C99', category:'cancer',
    type:3, label:'3종', isCancel:false, isCancer:true,
    desc:'악성신생물 근치 방사선 조사 — 5,000Rad 이상 / 사이버나이프 포함 (방사선 분류표 3종)',
    notes:'재해·질병수술비 특약에서 방사선 치료가 수술로 인정되는지 확인 필요',
    noPay:['5,000Rad 미만 완화적 방사선치료', '항암약물치료'] },

  { id:105, name:'관상동맥우회술 (암 제외)', kcd:'I25', category:'cancer',
    type:5, label:'5종', isCancel:false, isCancer:false,
    desc:'2대 주요치료비 — 관상동맥우회술 해당 여부 확인 (심장 특약)',
    notes:'2대 주요치료비 특약 가입 여부 별도 확인',
    noPay:['PCI(경피적 관상동맥중재술)는 2대 주요치료비 미해당'] },
];

// ───────────────────────────────
let currentFilter = 'all';
let currentSearch = '';
let acHighlight = -1;
let acItems = [];

function getTypeClass(t, isCancer) {
  if(isCancer) return 'c';
  return t;
}

function formatMoney(v) {
  if(!v && v!==0) return '-';
  if(v >= 10000) return (v/10000).toFixed(v%10000===0?0:1) + '억원';
  if(v >= 1000) return (v/1000).toFixed(v%1000===0?0:1) + '천만원';
  return v.toLocaleString() + '만원';
}

function calcPayout(item) {
  const surgAmt = parseFloat(document.getElementById('surgeryAmt').value) || 0;
  const disAmt  = parseFloat(document.getElementById('disAmt').value) || 0;
  const mulMap = {1:1, 2:2, 3:5, 4:10, 5:20};
  const mul = item.isCancer ? (item.type===5 ? 20 : 5) : (mulMap[item.type]||1);
  const surgPay = surgAmt * mul;
  const disPay  = disAmt;
  const total   = surgPay + disPay;
  return { surgPay, disPay, total, mul };
}

// ── 하이라이트 처리 ──
function highlight(text, q) {
  if(!q) return text;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

// ── 자동완성 드롭다운 ──
function getAcPillClass(item) {
  return item.isCancer ? 'ac-pill-c' : `ac-pill-${item.type}`;
}

function buildAcItems(q) {
  if(!q || q.length < 1) return [];
  const ql = q.toLowerCase();
  return DB.filter(item =>
    item.name.toLowerCase().includes(ql) ||
    item.kcd.toLowerCase().includes(ql) ||
    item.desc.toLowerCase().includes(ql)
  ).slice(0, 10);
}

function renderAutocomplete(q) {
  const box = document.getElementById('acBox');
  acItems = buildAcItems(q);
  acHighlight = -1;

  if(!q || acItems.length === 0) {
    box.classList.remove('open');
    box.innerHTML = '';
    return;
  }

  let html = `<div class="ac-header">검색결과 — 클릭하면 바로 확인</div>`;
  acItems.forEach((item, i) => {
    const pillClass = getAcPillClass(item);
    const pillLabel = item.isCancer ? '암' : item.type;
    const cancerTag = item.isCancer ? `<span class="ac-cancer-tag">암수술</span>` : '';
    const surgAmt = parseFloat(document.getElementById('surgeryAmt').value) || 0;
    const mulMap = {1:1, 2:2, 3:5, 4:10, 5:20};
    const mul = item.isCancer ? (item.type===5?20:5) : (mulMap[item.type]||1);
    const pay = surgAmt * mul;
    const payStr = surgAmt > 0 ? ` · 예상 <strong style="color:#1e3a5f">${formatMoney(pay)}</strong>` : '';

    html += `
    <div class="ac-item" data-idx="${i}" onclick="selectAcItem(${i})">
      <div class="ac-type-pill ${pillClass}">
        <span class="pill-num">${pillLabel}</span>
        <span class="pill-jong">종</span>
      </div>
      <div class="ac-info">
        <div class="ac-name">${highlight(item.name, q)}</div>
        <div class="ac-sub">
          <span class="ac-kcd">${item.kcd}</span>
          ${cancerTag}
          <span>${item.type}종 수술${payStr}</span>
        </div>
      </div>
      <span class="ac-arrow">→</span>
    </div>`;
  });

  box.innerHTML = html;
  box.classList.add('open');
}

function selectAcItem(idx) {
  const item = acItems[idx];
  if(!item) return;
  document.getElementById('searchInput').value = item.name;
  currentSearch = item.name;
  closeAc();
  // Show only this item
  showResults([item]);
}

function closeAc() {
  const box = document.getElementById('acBox');
  box.classList.remove('open');
  acHighlight = -1;
}

function onInputChange(val) {
  currentSearch = val;
  renderAutocomplete(val);
  // 실시간 메인 결과도 업데이트
  if(val.trim().length > 0) {
    showResults(getFiltered());
  } else {
    showResults(getFiltered());
  }
}

function onInputKeydown(e) {
  const box = document.getElementById('acBox');
  const items = box.querySelectorAll('.ac-item');
  if(e.key === 'ArrowDown') {
    e.preventDefault();
    acHighlight = Math.min(acHighlight+1, items.length-1);
    items.forEach((el,i) => el.classList.toggle('highlighted', i===acHighlight));
  } else if(e.key === 'ArrowUp') {
    e.preventDefault();
    acHighlight = Math.max(acHighlight-1, -1);
    items.forEach((el,i) => el.classList.toggle('highlighted', i===acHighlight));
  } else if(e.key === 'Enter') {
    if(acHighlight >= 0 && acItems[acHighlight]) {
      selectAcItem(acHighlight);
    } else {
      onSearch();
      closeAc();
    }
  } else if(e.key === 'Escape') {
    closeAc();
  }
}

// 외부 클릭시 드롭다운 닫기
document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-wrap')) closeAc();
});

function renderCard(item) {
  const { surgPay, disPay, total, mul } = calcPayout(item);
  const tc = getTypeClass(item.type, item.isCancer);
  const q = currentSearch;

  const badgeClass = item.isCancer ? 'badge-cancer' : `badge-${item.type}`;
  const badgeText  = item.isCancer ? `암수술·${item.label}` : `${item.label} 수술`;

  const noPays = item.noPay.filter(x=>x.trim());
  const nopayHTML = noPays.length ? `
    <div class="no-pay-box">
      <div class="no-pay-title">🚫 부지급 주의사항</div>
      <ul class="no-pay-list">
        ${noPays.map(x=>`<li>${x}</li>`).join('')}
      </ul>
    </div>` : '';

  const disRow = disPay > 0 ? `<div class="detail-row"><span class="detail-icon">➕</span><span class="detail-text">질병수술비: <strong>${formatMoney(disPay)}</strong></span></div>` : '';
  const cancerNote = item.isCancer ? `<div class="detail-row"><span class="detail-icon">🎗</span><span class="detail-text"><strong>암 특약(암수술비)</strong> 별도 지급 가능 — 증권 확인 필요</span></div>` : '';

  return `
  <div class="result-card" onclick="this.classList.toggle('selected')">
    <div class="card-header">
      <div style="flex:1">
        <div class="card-name">${highlight(item.name, q)}</div>
        <div class="card-meta">KCD: <strong>${highlight(item.kcd, q)}</strong></div>
        <div class="card-badges">
          <span class="badge ${badgeClass}">${badgeText}</span>
          ${item.isCancer ? '<span class="badge badge-cancer">암수술비 해당</span>' : '<span class="badge badge-general">일반질병</span>'}
        </div>
      </div>
      <div class="type-box type-box-${tc}">${item.type}종</div>
    </div>
    <div class="payout-panel">
      <div class="payout-label">예상 총 지급액</div>
      <div class="payout-amount">${formatMoney(total)}</div>
      <div class="payout-breakdown">수술비 ${formatMoney(surgPay)} (${item.type}종×${mul}배)${disPay>0?' + 질병수술비 '+formatMoney(disPay):''}</div>
    </div>
    <div class="card-detail">
      <div class="detail-row"><span class="detail-icon">📋</span><span class="detail-text"><strong>수술 정의:</strong> ${item.desc}</span></div>
      ${item.notes ? `<div class="detail-row"><span class="detail-icon">💡</span><span class="detail-text">${item.notes}</span></div>` : ''}
      ${disRow}
      ${cancerNote}
      ${nopayHTML}
    </div>
  </div>`;
}


function recalcAll() {
  showResults(getFiltered());
  // 드롭다운도 갱신
  const val = document.getElementById('searchInput').value;
  if(val) renderAutocomplete(val);
}

function getFiltered() {
  const q = currentSearch.toLowerCase().trim();
  return DB.filter(item => {
    const catMatch = currentFilter === 'all' || item.category === currentFilter;
    const textMatch = !q ||
      item.name.toLowerCase().includes(q) ||
      item.kcd.toLowerCase().includes(q) ||
      item.desc.toLowerCase().includes(q) ||
      item.label.toLowerCase().includes(q);
    return catMatch && textMatch;
  });
}

function showResults(items) {
  const area = document.getElementById('resultsArea');
  const list = document.getElementById('resultsList');
  const title = document.getElementById('resultsTitle');

  area.classList.add('visible');

  if(items.length === 0) {
    title.textContent = '';
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없습니다.<br>다른 검색어나 부위를 선택해 보세요.</p></div>`;
    return;
  }

  const cancerItems = items.filter(x=>x.isCancer);
  const normalItems = items.filter(x=>!x.isCancer);

  title.innerHTML = `검색 결과 <span class="results-count">${items.length}건</span>`;

  let html = '';
  if(currentFilter === 'cancer' && cancerItems.length > 0) {
    html += `<div class="cancer-section-header">🎗 암 수술 — 별도 암 특약 확인 필수</div>`;
    html += cancerItems.map(renderCard).join('');
  } else if(cancerItems.length > 0 && normalItems.length > 0) {
    html += normalItems.map(renderCard).join('');
    html += `<div class="cancer-section-header" style="margin-top:8px">🎗 암 수술 — 별도 암 특약 확인 필수</div>`;
    html += cancerItems.map(renderCard).join('');
  } else {
    html += items.map(renderCard).join('');
  }

  list.innerHTML = html;
}

function onSearch() {
  currentSearch = document.getElementById('searchInput').value;
  closeAc();
  showResults(getFiltered());
}

function filterCategory(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  showResults(getFiltered());
}

window.onload = () => {
  showResults(getFiltered());
};
</script>
